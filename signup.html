<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up – Nearby</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js" defer></script>
</head>
<body>
  <div class="auth-container">
    <h2>Join Nearby</h2>
    <form id="signup-form">
      <input type="text" id="full-name" placeholder="Full Name" required>
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Password (min 6 chars)" minlength="6" required>
      <button type="submit">Sign Up</button>
    </form>
    <p id="error-message" style="color:red;"></p>
    <p>Already have an account? <a href="login.html">Log in</a></p>
  </div>

  <script>
    document.getElementById('signup-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fullName = document.getElementById('full-name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('error-message');
      
      // 1. Sign up with Supabase Auth
      const { data, error } = await supabase.auth.signUp({
        email,
        password,
        options: {
          data: {
            full_name: fullName
          }
        }
      });
      
      if (error) {
        errorEl.textContent = error.message;
        return;
      }
      
      // 2. Create a record in public.users table (trigger would be better but manual for now)
      if (data.user) {
        const { error: profileError } = await supabase
          .from('users')
          .insert([
            { 
              id: data.user.id,
              email: email,
              full_name: fullName,
              username: email.split('@')[0], // temporary username
              reputation_points: 0,
              ambassador_level: 'Neighbor'
            }
          ]);
        
        if (profileError) {
          console.error('Profile creation error:', profileError);
          // Still proceed to onboarding
        }
      }
      
      // 3. Redirect to onboarding
      window.location.href = 'onboarding-1.html';
    });
  </script>
</body>
</html>
