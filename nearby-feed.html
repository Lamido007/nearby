<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nearby — Your Neighborhood</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cream: #F5F0E8; --terracotta: #C4622D; --navy: #1A2332;
    --sage: #7A9E7E; --amber: #E8A838; --mid: #4A5568;
    --light: #8A96A8; --white: #FDFAF4; --whatsapp: #25D366;
  }
  body {
    font-family: 'DM Sans', sans-serif; background: #F0EBE1;
    color: var(--navy); min-height: 100vh; max-width: 480px; margin: 0 auto;
  }

  /* TOP NAV */
  .topnav {
    background: var(--white); padding: 14px 16px 10px;
    position: sticky; top: 0; z-index: 100;
    border-bottom: 1px solid rgba(0,0,0,0.07);
  }
  .topnav-row1 { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .logo { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 900; color: var(--navy); }
  .logo span { color: var(--terracotta); }
  .nav-icons { display: flex; gap: 8px; }
  .nav-icon {
    width: 38px; height: 38px; border-radius: 50%; background: var(--cream);
    border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 18px; position: relative; text-decoration: none;
  }
  .notif-dot {
    position: absolute; top: 4px; right: 4px;
    width: 8px; height: 8px; background: var(--terracotta);
    border-radius: 50%; border: 2px solid var(--white);
  }
  .location-bar { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--mid); }
  .location-bar span { color: var(--navy); font-weight: 600; }
  #notif-badge { display: none; }

  /* FILTER TABS */
  .filter-tabs {
    display: flex; gap: 8px; overflow-x: auto;
    padding: 12px 16px; background: var(--white); scrollbar-width: none;
  }
  .filter-tabs::-webkit-scrollbar { display: none; }
  .ftab {
    flex-shrink: 0; padding: 7px 16px; border-radius: 100px;
    border: 2px solid rgba(0,0,0,0.1); background: transparent;
    font-size: 13px; font-weight: 600; color: var(--mid);
    cursor: pointer; font-family: 'DM Sans', sans-serif; white-space: nowrap;
  }
  .ftab.active { background: var(--navy); border-color: var(--navy); color: white; }

  /* FEED */
  .feed { padding: 12px 16px 100px; }

  /* LOADING STATE */
  .feed-loading {
    display: flex; flex-direction: column; gap: 12px;
  }
  .skeleton-card {
    background: var(--white); border-radius: 18px; padding: 16px;
    animation: shimmer 1.5s ease infinite;
  }
  .skeleton-line {
    height: 12px; border-radius: 100px; background: rgba(0,0,0,0.06); margin-bottom: 8px;
  }
  .skeleton-line.wide { width: 80%; }
  .skeleton-line.mid { width: 55%; }
  .skeleton-line.short { width: 35%; }
  .skeleton-circle { width: 44px; height: 44px; border-radius: 50%; background: rgba(0,0,0,0.06); }
  .skeleton-row { display: flex; gap: 10px; align-items: center; margin-bottom: 12px; }
  .skeleton-meta { flex: 1; }
  @keyframes shimmer { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

  /* EMPTY STATE */
  .empty-state {
    text-align: center; padding: 60px 20px; display: none;
  }
  .empty-state .emoji { font-size: 48px; margin-bottom: 16px; }
  .empty-state h3 { font-size: 18px; font-weight: 700; color: var(--navy); margin-bottom: 8px; }
  .empty-state p { font-size: 14px; color: var(--mid); line-height: 1.6; margin-bottom: 24px; }
  .empty-state button {
    padding: 12px 28px; border-radius: 100px;
    background: var(--terracotta); color: white; border: none;
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer;
  }

  /* NEW ARRIVALS STRIP */
  .section-label {
    font-size: 12px; font-weight: 700; color: var(--terracotta);
    letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; margin-top: 4px;
  }
  .arrivals-strip {
    display: flex; gap: 12px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 16px; scrollbar-width: none;
  }
  .arrivals-strip::-webkit-scrollbar { display: none; }
  .arrival-card {
    flex-shrink: 0; background: var(--white); border-radius: 16px;
    padding: 14px 12px; text-align: center; width: 100px;
    border: 2px solid rgba(196,98,45,0.15); cursor: pointer;
    transition: transform 0.2s;
  }
  .arrival-card:hover { transform: translateY(-2px); }
  .arrival-avatar {
    width: 52px; height: 52px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 700; color: white;
    margin: 0 auto 8px; position: relative;
  }
  .new-ring { position: absolute; inset: -3px; border-radius: 50%; border: 2px solid var(--terracotta); }
  .arrival-name { font-size: 12px; font-weight: 600; color: var(--navy); margin-bottom: 2px; }
  .arrival-sub { font-size: 10px; color: var(--light); }

  /* POST CARD */
  .card { background: var(--white); border-radius: 18px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
  .card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .avatar {
    width: 44px; height: 44px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px; font-weight: 700; color: white; flex-shrink: 0;
  }
  .card-meta { flex: 1; min-width: 0; }
  .card-name { font-size: 14px; font-weight: 700; color: var(--navy); }
  .card-detail { font-size: 12px; color: var(--light); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-more { font-size: 20px; color: var(--light); background: none; border: none; cursor: pointer; padding: 4px; }
  .badge-pill {
    display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 7px;
    border-radius: 100px; margin-left: 4px; vertical-align: middle;
  }
  .badge-1 { background: rgba(122,158,126,0.2); color: var(--sage); }
  .badge-2 { background: rgba(232,168,56,0.2); color: #B07D10; }
  .badge-3 { background: rgba(196,98,45,0.2); color: var(--terracotta); }
  .badge-4 { background: rgba(155,89,182,0.2); color: #9B59B6; }

  /* Post type badges */
  .type-badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 10px; border-radius: 100px; font-size: 11px; font-weight: 700; margin-bottom: 8px;
  }
  .tbadge-job { background: rgba(122,158,126,0.15); color: var(--sage); }
  .tbadge-event { background: rgba(232,168,56,0.15); color: #B07D10; }
  .tbadge-alert { background: rgba(229,62,62,0.1); color: #C53030; }
  .tbadge-post { background: rgba(196,98,45,0.1); color: var(--terracotta); }
  .tbadge-welcome { background: rgba(122,158,126,0.12); color: var(--sage); }

  .card-text { font-size: 14px; color: var(--mid); line-height: 1.6; margin-bottom: 12px; }

  .job-details { background: var(--cream); border-radius: 12px; padding: 12px 14px; margin-bottom: 12px; }
  .job-row { display: flex; gap: 16px; flex-wrap: wrap; }
  .job-item { font-size: 12px; color: var(--mid); }
  .job-item b { color: var(--navy); display: block; font-size: 13px; }

  /* Card actions */
  .card-actions {
    display: flex; align-items: center; gap: 4px;
    padding-top: 10px; border-top: 1px solid rgba(0,0,0,0.06);
  }
  .action-btn {
    display: flex; align-items: center; gap: 5px;
    padding: 7px 10px; border-radius: 100px;
    border: none; background: transparent; cursor: pointer;
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; color: var(--light);
    transition: background 0.15s, color 0.15s;
  }
  .action-btn:hover { background: var(--cream); color: var(--navy); }
  .action-btn.liked { color: var(--terracotta); }
  /* WhatsApp share button */
  .wa-btn {
    display: flex; align-items: center; gap: 5px;
    padding: 7px 10px; border-radius: 100px;
    border: none; background: transparent; cursor: pointer;
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
    color: var(--whatsapp); transition: background 0.15s;
  }
  .wa-btn:hover { background: rgba(37,211,102,0.1); }
  .action-spacer { flex: 1; }
  .apply-btn {
    padding: 8px 16px; border-radius: 100px; background: var(--navy); color: white;
    border: none; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer;
    transition: background 0.2s;
  }
  .apply-btn:hover { background: var(--terracotta); }
  .apply-btn:disabled { background: var(--sage); cursor: default; }

  /* BOTTOM NAV */
  .bottom-nav {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 480px;
    background: var(--white); border-top: 1px solid rgba(0,0,0,0.08);
    display: flex; padding: 10px 0 16px;
  }
  .bnav-item {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    gap: 4px; cursor: pointer; padding: 4px 0;
    border: none; background: none; font-family: 'DM Sans', sans-serif;
    text-decoration: none;
  }
  .bnav-icon { font-size: 22px; }
  .bnav-label { font-size: 10px; font-weight: 600; color: var(--light); }
  .bnav-item.active .bnav-label { color: var(--terracotta); }

  /* FAB */
  .fab {
    position: fixed; bottom: 80px; right: 20px;
    width: 52px; height: 52px; border-radius: 50%;
    background: var(--terracotta); color: white;
    border: none; font-size: 24px; cursor: pointer;
    box-shadow: 0 6px 20px rgba(196,98,45,0.4);
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.2s;
  }
  .fab:hover { transform: scale(1.1); }

  /* POST COMPOSER */
  .composer {
    display: none; position: fixed; bottom: 0; left: 50%;
    transform: translateX(-50%); width: 100%; max-width: 480px;
    background: var(--white); border-radius: 24px 24px 0 0;
    padding: 20px 16px 32px;
    box-shadow: 0 -8px 40px rgba(0,0,0,0.15); z-index: 200;
  }
  .composer.open { display: block; }
  .comp-handle { width: 40px; height: 4px; background: rgba(0,0,0,0.1); border-radius: 100px; margin: 0 auto 16px; }
  .comp-title { font-size: 16px; font-weight: 700; color: var(--navy); margin-bottom: 14px; }
  .comp-types { display: flex; gap: 8px; margin-bottom: 14px; overflow-x: auto; scrollbar-width: none; }
  .comp-types::-webkit-scrollbar { display: none; }
  .comp-type {
    flex-shrink: 0; display: flex; align-items: center; gap: 6px;
    padding: 7px 14px; border-radius: 100px;
    border: 2px solid rgba(0,0,0,0.1); background: white;
    font-size: 13px; font-weight: 600; color: var(--mid);
    cursor: pointer; font-family: 'DM Sans', sans-serif;
  }
  .comp-type.on { border-color: var(--terracotta); color: var(--terracotta); background: rgba(196,98,45,0.06); }
  .comp-input {
    width: 100%; border: 2px solid rgba(0,0,0,0.1); border-radius: 14px;
    padding: 12px 14px; font-family: 'DM Sans', sans-serif;
    font-size: 15px; color: var(--navy); resize: none; outline: none; margin-bottom: 14px;
  }
  .comp-input:focus { border-color: var(--terracotta); }
  .comp-footer { display: flex; justify-content: space-between; align-items: center; }
  .comp-post {
    padding: 11px 28px; border-radius: 100px; background: var(--navy); color: white;
    border: none; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer;
  }
  .comp-post:disabled { opacity: 0.6; cursor: default; }
  .comp-cancel { background: none; border: none; font-size: 14px; color: var(--light); cursor: pointer; font-family: 'DM Sans', sans-serif; }
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 150; }
  .overlay.open { display: block; }

  /* Toast notification */
  .toast {
    position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
    background: var(--navy); color: white; padding: 12px 20px;
    border-radius: 100px; font-size: 14px; font-weight: 600;
    z-index: 999; white-space: nowrap;
    animation: slideDown 0.3s ease, fadeOut 0.3s ease 2.5s both;
  }
  @keyframes slideDown { from { opacity: 0; transform: translateX(-50%) translateY(-10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
  @keyframes fadeOut { to { opacity: 0; } }
</style>
</head>
<body>

<!-- TOP NAV -->
<div class="topnav">
  <div class="topnav-row1">
    <div class="logo">Near<span>by</span></div>
    <div class="nav-icons">
      <a href="nearby-notifications.html" class="nav-icon">
        🔔
        <div class="notif-dot" id="notif-badge"></div>
      </a>
      <a href="nearby-messages.html" class="nav-icon">💬</a>
      <a href="nearby-profile.html" class="nav-icon">👤</a>
    </div>
  </div>
  <div class="location-bar">
    📍 <span id="user-neighborhood">Your Neighborhood</span>
    <span style="color:var(--light)">·</span>
    <span id="user-badge-display" style="font-size:11px;"></span>
  </div>
</div>

<!-- FILTER TABS -->
<div class="filter-tabs">
  <button class="ftab active" onclick="setTab(this, 'all')">🏡 All</button>
  <button class="ftab" onclick="setTab(this, 'post')">💬 Posts</button>
  <button class="ftab" onclick="setTab(this, 'job')">💼 Jobs</button>
  <button class="ftab" onclick="setTab(this, 'event')">🎉 Events</button>
  <button class="ftab" onclick="setTab(this, 'alert')">🔔 Alerts</button>
  <button class="ftab" onclick="setTab(this, 'welcome')">🆕 Arrivals</button>
</div>

<!-- FEED -->
<div class="feed">

  <!-- LOADING SKELETONS -->
  <div class="feed-loading" id="feed-loading">
    <div class="skeleton-card">
      <div class="skeleton-row"><div class="skeleton-circle"></div><div class="skeleton-meta"><div class="skeleton-line wide"></div><div class="skeleton-line short"></div></div></div>
      <div class="skeleton-line wide"></div><div class="skeleton-line mid"></div><div class="skeleton-line short"></div>
    </div>
    <div class="skeleton-card">
      <div class="skeleton-row"><div class="skeleton-circle"></div><div class="skeleton-meta"><div class="skeleton-line mid"></div><div class="skeleton-line short"></div></div></div>
      <div class="skeleton-line wide"></div><div class="skeleton-line wide"></div>
    </div>
    <div class="skeleton-card">
      <div class="skeleton-row"><div class="skeleton-circle"></div><div class="skeleton-meta"><div class="skeleton-line wide"></div><div class="skeleton-line mid"></div></div></div>
      <div class="skeleton-line mid"></div>
    </div>
  </div>

  <!-- NEW ARRIVALS STRIP (hidden until loaded) -->
  <div id="arrivals-section" style="display:none">
    <div class="section-label">🆕 New in your neighborhood</div>
    <div class="arrivals-strip" id="arrivals-strip"></div>
  </div>

  <!-- POSTS CONTAINER -->
  <div id="posts-container"></div>

  <!-- EMPTY STATE -->
  <div class="empty-state" id="empty-state">
    <div class="emoji">🏘️</div>
    <h3>Your neighborhood is quiet...</h3>
    <p>Be the first to post! Share something with your neighbors — a hello, a tip, or something you need.</p>
    <button onclick="openComposer()">Start the Conversation</button>
  </div>

</div>

<!-- FAB -->
<button class="fab" onclick="openComposer()">✏️</button>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closeComposer()"></div>

<!-- POST COMPOSER -->
<div class="composer" id="composer">
  <div class="comp-handle"></div>
  <div class="comp-title">Share with your neighborhood</div>
  <div class="comp-types">
    <button class="comp-type on" onclick="setCompType(this, 'post')">💬 Post</button>
    <button class="comp-type" onclick="setCompType(this, 'job')">💼 Job</button>
    <button class="comp-type" onclick="setCompType(this, 'event')">🎉 Event</button>
    <button class="comp-type" onclick="setCompType(this, 'alert')">🔔 Alert</button>
  </div>
  <textarea class="comp-input" id="comp-text" rows="4" placeholder="What's happening in your neighborhood?"></textarea>
  <div class="comp-footer">
    <button class="comp-cancel" onclick="closeComposer()">Cancel</button>
    <button class="comp-post" id="comp-post-btn" onclick="submitPost()">Post Nearby</button>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="bnav-item active">
    <div class="bnav-icon">🏡</div>
    <div class="bnav-label">Home</div>
  </button>
  <a href="nearby-arrivals.html" class="bnav-item">
    <div class="bnav-icon">🆕</div>
    <div class="bnav-label">Arrivals</div>
  </a>
  <a href="nearby-jobs.html" class="bnav-item">
    <div class="bnav-icon">💼</div>
    <div class="bnav-label">Jobs</div>
  </a>
  <a href="nearby-profile.html" class="bnav-item">
    <div class="bnav-icon">👤</div>
    <div class="bnav-label">Profile</div>
  </a>
</div>

<script>
  // ── STATE ──
  let currentUser = null
  let currentFilter = 'all'
  let selectedPostType = 'post'
  let allPosts = []

  const AVATAR_COLORS = [
    '#C4622D','#7A9E7E','#1A2332','#E8A838',
    '#2980B9','#9B59B6','#E53E3E','#2ECC71'
  ]

  function getColor(str) {
    if (!str) return AVATAR_COLORS[0]
    let hash = 0
    for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash)
    return AVATAR_COLORS[Math.abs(hash) % AVATAR_COLORS.length]
  }

  function getTypeLabel(type) {
    const map = { post: '💬 Post', job: '💼 Job Opening', event: '🎉 Event', alert: '🔔 Alert', welcome: '👋 Welcome' }
    return map[type] || '💬 Post'
  }

  function getTypeBadgeClass(type) {
    const map = { post: 'tbadge-post', job: 'tbadge-job', event: 'tbadge-event', alert: 'tbadge-alert', welcome: 'tbadge-welcome' }
    return map[type] || 'tbadge-post'
  }

  function renderBadge(level) {
    const names = { 1: 'Neighbor', 2: 'Star', 3: 'Ambassador', 4: 'Legend' }
    return `<span class="badge-pill badge-${level}">${names[level] || 'Neighbor'}</span>`
  }

  // ── INIT ──
  async function init() {
    // Check auth
    const session = await getSession()
    if (!session) {
      window.location.href = 'nearby-auth.html'
      return
    }

    currentUser = await getCurrentUser()

    if (!currentUser) {
      // User exists in auth but not in users table — go to onboarding
      window.location.href = 'nearby-onboarding.html'
      return
    }

    // Update UI with user info
    const neighborhood = currentUser.neighborhood || 'Your Neighborhood'
    document.getElementById('user-neighborhood').textContent = neighborhood
    if (currentUser.badge_level) {
      document.getElementById('user-badge-display').textContent = getBadgeName(currentUser.badge_level)
    }

    // Load unread notifications count
    const unread = await getUnreadCount(currentUser.id)
    if (unread > 0) document.getElementById('notif-badge').style.display = 'block'

    // Load feed
    await loadFeedPosts(neighborhood)

    // Load arrivals
    await loadArrivalsStrip(neighborhood)

    // Subscribe to real-time new posts
    subscribeToFeed(neighborhood, (payload) => {
      // New post arrived — prepend it
      allPosts.unshift(payload.new)
      renderPosts(allPosts)
      showToast('🆕 New post in your neighborhood!')
    })
  }

  // ── LOAD FEED ──
  async function loadFeedPosts(neighborhood) {
    const { data, error } = await loadFeed(neighborhood, 30)

    document.getElementById('feed-loading').style.display = 'none'

    if (error) {
      showToast('⚠️ Could not load posts. Check your connection.')
      return
    }

    allPosts = data || []
    renderPosts(allPosts)
  }

  // ── RENDER POSTS ──
  function renderPosts(posts) {
    const container = document.getElementById('posts-container')
    const emptyState = document.getElementById('empty-state')

    const filtered = currentFilter === 'all'
      ? posts
      : posts.filter(p => p.post_type === currentFilter)

    if (filtered.length === 0) {
      container.innerHTML = ''
      emptyState.style.display = 'block'
      return
    }

    emptyState.style.display = 'none'
    container.innerHTML = filtered.map(post => renderPostCard(post)).join('')
  }

  function renderPostCard(post) {
    const user = post.users || {}
    const name = user.full_name || 'Community Member'
    const initials = getInitials(name)
    const color = getColor(user.id || name)
    const badgeHtml = user.badge_level ? renderBadge(user.badge_level) : ''
    const time = timeAgo(post.created_at)
    const isOwn = currentUser && post.user_id === currentUser.id

    const typeLabel = getTypeLabel(post.post_type)
    const typeBadgeClass = getTypeBadgeClass(post.post_type)

    // Actions
    const likeText = `${post.likes_count || 0}`
    const commentsText = `${post.comments_count || 0}`

    // WhatsApp share button
    const waShare = post.post_type === 'job'
      ? `<button class="wa-btn" onclick="shareJobWA('${escHtml(post.content.slice(0,60))}','${escHtml(post.neighborhood || '')}')">📲 Share</button>`
      : `<button class="wa-btn" onclick="sharePostWA('${escHtml(post.content.slice(0,120))}','${escHtml(post.neighborhood || '')}')">📲 Share</button>`

    const flagBtn = isOwn ? '' : `<button class="action-btn" onclick="flagPostUI('${post.id}')">🚩</button>`

    return `
    <div class="card" id="post-${post.id}">
      <div class="card-header">
        <div class="avatar" style="background:${color}">${initials}</div>
        <div class="card-meta">
          <div class="card-name">${escHtml(name)}${badgeHtml}</div>
          <div class="card-detail">📍 ${escHtml(post.neighborhood || 'Neighborhood')} · ${time}</div>
        </div>
        ${isOwn ? `<button class="card-more" onclick="deletePostUI('${post.id}')">🗑️</button>` : '<button class="card-more">···</button>'}
      </div>
      <span class="type-badge ${typeBadgeClass}">${typeLabel}</span>
      <div class="card-text">${escHtml(post.content)}</div>
      <div class="card-actions">
        <button class="action-btn" id="like-${post.id}" onclick="handleLike('${post.id}', this)">🤍 ${likeText}</button>
        <button class="action-btn">💬 ${commentsText}</button>
        ${waShare}
        ${flagBtn}
      </div>
    </div>`
  }

  function escHtml(str) {
    if (!str) return ''
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')
  }

  // ── LOAD ARRIVALS ──
  async function loadArrivalsStrip(neighborhood) {
    const arrivals = await getNewArrivals(neighborhood, 30)
    if (!arrivals || arrivals.length === 0) return

    const strip = document.getElementById('arrivals-strip')
    strip.innerHTML = arrivals.slice(0, 10).map(u => {
      const initials = getInitials(u.full_name)
      const color = getColor(u.id)
      return `
      <div class="arrival-card" onclick="welcomeArrival('${u.id}')">
        <div class="arrival-avatar" style="background:${color}">
          ${initials}
          <div class="new-ring"></div>
        </div>
        <div class="arrival-name">${escHtml(u.full_name.split(' ')[0])}</div>
        <div class="arrival-sub">${timeAgo(u.created_at)}</div>
      </div>`
    }).join('')

    document.getElementById('arrivals-section').style.display = 'block'
  }

  // ── FILTER TABS ──
  function setTab(el, filter) {
    document.querySelectorAll('.ftab').forEach(t => t.classList.remove('active'))
    el.classList.add('active')
    currentFilter = filter
    renderPosts(allPosts)
  }

  // ── LIKE ──
  const likedPosts = new Set()

  async function handleLike(postId, btn) {
    if (!currentUser) return

    if (likedPosts.has(postId)) {
      likedPosts.delete(postId)
      btn.classList.remove('liked')
      const num = parseInt(btn.textContent.replace(/\D/g,'')) || 0
      btn.textContent = '🤍 ' + Math.max(0, num - 1)
    } else {
      likedPosts.add(postId)
      btn.classList.add('liked')
      const num = parseInt(btn.textContent.replace(/\D/g,'')) || 0
      btn.textContent = '❤️ ' + (num + 1)
      await likePost(postId, currentUser.id)
    }
  }

  // ── WHATSAPP SHARE ──
  function sharePostWA(content, neighborhood) {
    sharePostWhatsApp(content, neighborhood)
  }

  function shareJobWA(content, neighborhood) {
    shareJobWhatsApp(content, 'this role', neighborhood)
  }

  // ── WELCOME NEWCOMER ──
  async function welcomeArrival(userId) {
    if (!currentUser || userId === currentUser.id) return
    await welcomeNewcomer(currentUser.id, userId)
    showToast('👋 Welcome sent! +10 rep points earned')
  }

  // ── FLAG POST ──
  async function flagPostUI(postId) {
    if (!currentUser) return
    if (confirm('Flag this post for moderation?')) {
      await flagPost(postId, currentUser.id, 'Inappropriate content')
      document.getElementById('post-' + postId).style.opacity = '0.5'
      showToast('🚩 Post reported. Thank you.')
    }
  }

  // ── DELETE POST ──
  async function deletePostUI(postId) {
    if (!currentUser) return
    if (confirm('Delete this post?')) {
      await removePost(postId)
      const el = document.getElementById('post-' + postId)
      if (el) el.remove()
      showToast('🗑️ Post deleted.')
    }
  }

  // ── COMPOSER ──
  function openComposer() {
    document.getElementById('composer').classList.add('open')
    document.getElementById('overlay').classList.add('open')
    document.getElementById('comp-text').focus()
  }

  function closeComposer() {
    document.getElementById('composer').classList.remove('open')
    document.getElementById('overlay').classList.remove('open')
  }

  function setCompType(el, type) {
    document.querySelectorAll('.comp-type').forEach(c => c.classList.remove('on'))
    el.classList.add('on')
    selectedPostType = type
    const placeholders = {
      post: "What's happening in your neighborhood?",
      job: "Job title, pay, and what you're looking for...",
      event: "Event name, date, time, and where...",
      alert: "Important neighborhood alert or safety notice..."
    }
    document.getElementById('comp-text').placeholder = placeholders[type] || ''
  }

  async function submitPost() {
    const content = document.getElementById('comp-text').value.trim()
    if (!content) { showToast('✍️ Write something first!'); return }
    if (!currentUser) return

    const btn = document.getElementById('comp-post-btn')
    btn.disabled = true
    btn.textContent = 'Posting...'

    const neighborhood = currentUser.neighborhood || 'General'
    const { data, error } = await createPost(currentUser.id, content, selectedPostType, neighborhood)

    if (error) {
      showToast('❌ Could not post. Try again.')
    } else {
      closeComposer()
      document.getElementById('comp-text').value = ''
      showToast('🎉 Posted to ' + neighborhood + '! +5 rep points')
      // Add to top of feed locally (real-time will also fire)
      if (data && data[0]) {
        data[0].users = currentUser
        allPosts.unshift(data[0])
        renderPosts(allPosts)
      }
    }

    btn.disabled = false
    btn.textContent = 'Post Nearby'
  }

  // ── TOAST ──
  function showToast(message) {
    const old = document.querySelector('.toast')
    if (old) old.remove()
    const toast = document.createElement('div')
    toast.className = 'toast'
    toast.textContent = message
    document.body.appendChild(toast)
    setTimeout(() => toast.remove(), 3000)
  }

  // ── START ──
  init()
</script>
</body>
</html>
